version: 2
updates:
  - package-ecosystem: "npm" #
    directory: "/" # Location of package manifests
    schedule:
      interval: "weekly"
    groups:
      # Bundle low-risk minor + patch bumps into a single PR. Major bumps are
      # left out so they still arrive as individual, reviewable PRs.
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"
    cooldown:
      default-days: 7
    ignore:
      # Must match the live site's Font Awesome (FA Free 6.4.2). Keep this pin,
      # public/fontawesome/, and src/data/faCatalog.ts all on 6.4.2 — do not bump.
      - dependency-name: "@fortawesome/fontawesome-free"
